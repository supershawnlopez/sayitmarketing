[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/leads"
  to = "/.netlify/functions/lead-create"
  status = 200

[[redirects]]
  from = "/api/pipeline"
  to = "/.netlify/functions/pipeline-list"
  status = 200

[[redirects]]
  from = "/api/leads/*/status"
  to = "/.netlify/functions/lead-status-update"
  status = 200

[[redirects]]
  from = "/api/webhooks/stripe"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
