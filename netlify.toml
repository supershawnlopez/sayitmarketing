[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/leads"
  to = "/.netlify/functions/lead-create"
  status = 200

[[redirects]]
  from = "/api/pipeline"
  to = "/.netlify/functions/pipeline-list"
  status = 200

[[redirects]]
  from = "/api/leads/*/status"
  to = "/.netlify/functions/lead-status-update"
  status = 200

[[redirects]]
  from = "/api/webhooks/stripe"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/create-social-checkout"
  to = "/.netlify/functions/create-social-checkout"
  status = 200

[[redirects]]
  from = "/print-services-tucson.html"
  to = "/print-services.html"
  status = 301

[functions."supabase-keepalive"]
  schedule = "0 9 */3 * *"
