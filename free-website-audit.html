<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Website Audit | SayIt Marketing</title>
  <meta name="description" content="Request a free website audit for your local business site.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: Manrope, system-ui, sans-serif; background: #f3f5f7; color: #101418; }
    .wrap { width: min(760px, calc(100% - 28px)); margin: 0 auto; }
    .section { padding: 48px 0; }
    .card { background: #fff; border: 1px solid #d8dee6; border-radius: 20px; padding: 24px; }
    h1 { margin: 0 0 10px; font-size: 2.2rem; letter-spacing: -0.03em; }
    p { margin: 0 0 16px; color: #5e6a79; }
    label { display: block; font-weight: 700; margin: 12px 0 6px; }
    input, select, textarea {
      width: 100%; border: 1px solid #cfd7e2; border-radius: 12px; padding: 12px; font: inherit; background: #fff;
    }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      margin-top: 16px; border: 0; border-radius: 999px; padding: 13px 20px; font-weight: 800;
      color: #fff; background: linear-gradient(140deg, #096fb4, #0b4f80); cursor: pointer;
    }
    .status { margin-top: 12px; font-weight: 700; color: #0a5f99; min-height: 20px; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <section class="section">
    <div class="wrap">
      <div class="card">
        <h1>Free Website Audit</h1>
        <p>Get a quick website review and practical next steps for your business.</p>
        <form data-lead-form data-lead-type="audit" data-api="/api/leads">
          <div class="row">
            <div>
              <label for="full_name">Full Name</label>
              <input id="full_name" name="full_name" required>
            </div>
            <div>
              <label for="business_name">Business Name</label>
              <input id="business_name" name="business_name" required>
            </div>
          </div>

          <div class="row">
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required>
            </div>
            <div>
              <label for="mobile_phone">Mobile Phone (optional)</label>
              <input id="mobile_phone" name="mobile_phone">
            </div>
          </div>

          <label for="website_url">Website URL</label>
          <input id="website_url" name="website_url" placeholder="https://example.com" required>

          <div class="row">
            <div>
              <label for="service_interest">Primary Service Need</label>
              <select id="service_interest" name="service_interest" required>
                <option value="">Select one</option>
                <option>Website</option>
                <option>SEO</option>
                <option>Website + SEO</option>
                <option>Website + Social</option>
              </select>
            </div>
            <div>
              <label for="timeline">Timeline</label>
              <select id="timeline" name="timeline" required>
                <option value="">Select one</option>
                <option>asap</option>
                <option>2-4 weeks</option>
                <option>1-2 months</option>
                <option>exploring</option>
              </select>
            </div>
          </div>

          <label for="primary_goal">Biggest Website Issue</label>
          <select id="primary_goal" name="primary_goal" required>
            <option value="">Select one</option>
            <option>Not ranking</option>
            <option>Not converting visitors</option>
            <option>Looks outdated</option>
            <option>Slow loading speed</option>
          </select>

          <label for="notes">Extra Context</label>
          <textarea id="notes" name="notes" placeholder="Anything you want reviewed first."></textarea>

          <label>
            <input type="checkbox" name="consent_sms_email" required>
            I agree to receive email/text updates about this audit request.
          </label>

          <input type="text" name="website_field" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;">
          <button class="btn" type="submit">Request Free Audit</button>
          <div id="form-status" class="status"></div>
        </form>
      </div>
    </div>
  </section>
  <script src="assets/lead-form.js"></script>
</body>
</html>
